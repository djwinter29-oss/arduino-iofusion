name: Release Publish (PlatformIO)

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish, for example v1.2.3'
        required: true
        type: string

env:
  PLATFORMIO_OWNER: djwinter29
  PLATFORMIO_PACKAGE: IOFusion

concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-release:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_version: ${{ steps.resolve.outputs.release_version }}
    steps:
      - name: Resolve tag/version from trigger
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.release_tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          if ! [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must match vX.Y.Z or vX.Y.Z-suffix; got ${RELEASE_TAG}" >&2
            exit 1
          fi

          RELEASE_VERSION="${RELEASE_TAG#v}"
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "release_version=${RELEASE_VERSION}" >> "${GITHUB_OUTPUT}"

  validate:
    name: Validate before publish
    needs: [resolve-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-release.outputs.release_tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show resolved release version
        run: |
          echo "Release tag: ${{ needs.resolve-release.outputs.release_tag }}"
          echo "Release version: ${{ needs.resolve-release.outputs.release_version }}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run native tests
        run: |
          pio --version
          pio test -e native -v

      - name: Build firmware (uno)
        run: |
          pio run -e uno -v

  publish:
    name: Publish to PlatformIO Registry
    needs: [resolve-release, validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-release.outputs.release_tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show resolved release version
        run: |
          echo "Release tag: ${{ needs.resolve-release.outputs.release_tag }}"
          echo "Release version: ${{ needs.resolve-release.outputs.release_version }}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set package version from git tag
        run: |
          TAG_VERSION="${{ needs.resolve-release.outputs.release_version }}"
          echo "Using tag version: ${TAG_VERSION}"
          python tools/set_library_version.py "${TAG_VERSION}"
          ACTUAL_VERSION=$(python -c 'import json; print(json.load(open("library.json", encoding="utf-8"))["version"])')
          test "${ACTUAL_VERSION}" = "${TAG_VERSION}"
          echo "Updated library.json:"
          cat library.json

      - name: Login to PlatformIO
        env:
          PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
        run: |
          if [ -z "${PLATFORMIO_AUTH_TOKEN}" ]; then
            echo "Missing required secret: PLATFORMIO_AUTH_TOKEN" >&2
            exit 1
          fi
          pio account login --token "${PLATFORMIO_AUTH_TOKEN}"
          pio account show

      - name: Dry-run package pack
        run: |
          pio pkg pack --output /tmp/iofusion-release.tar.gz

      - name: Publish package
        run: |
          pio pkg publish --type library --owner "${PLATFORMIO_OWNER}" --no-interactive

      - name: Show published package
        run: |
          pio pkg show --type library "${PLATFORMIO_OWNER}/${PLATFORMIO_PACKAGE}"

      - name: Create or update GitHub Release notes with PlatformIO link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.resolve-release.outputs.release_tag }}"
          VERSION="${{ needs.resolve-release.outputs.release_version }}"
          REGISTRY_URL="https://registry.platformio.org/libraries/${PLATFORMIO_OWNER}/${PLATFORMIO_PACKAGE}"
          INSTALL_SNIPPET=$(printf 'lib_deps =\n  %s/%s@%s' "${PLATFORMIO_OWNER}" "${PLATFORMIO_PACKAGE}" "${VERSION}")
          CODE_FENCE='```'

          EXTRA_NOTES=$(cat <<EOF

## PlatformIO
- Registry: ${REGISTRY_URL}
- Version: ${VERSION}

### Install
${CODE_FENCE}ini
${INSTALL_SNIPPET}
${CODE_FENCE}
EOF
)

          if gh release view "${TAG}" >/dev/null 2>&1; then
            CURRENT_BODY=$(gh release view "${TAG}" --json body --jq '.body // ""')
            if echo "${CURRENT_BODY}" | grep -q "Registry: ${REGISTRY_URL}"; then
              echo "Release notes already contain PlatformIO block."
            else
              gh release edit "${TAG}" --notes "${CURRENT_BODY}${EXTRA_NOTES}"
              echo "Updated existing release notes for ${TAG}."
            fi
          else
            gh release create "${TAG}" --title "${TAG}" --notes "${EXTRA_NOTES#\n}"
            echo "Created release for ${TAG}."
          fi
