name: Release Publish (PlatformIO)

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'

env:
  PLATFORMIO_OWNER: djwinter29
  PLATFORMIO_PACKAGE: IOFusion

concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate before publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate release tag format
        run: |
          if ! [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must match vX.Y.Z or vX.Y.Z-suffix; got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run native tests
        run: |
          pio --version
          pio test -e native -v

      - name: Build firmware (uno)
        run: |
          pio run -e uno -v

  publish:
    name: Publish to PlatformIO Registry
    needs: [validate]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate release tag format
        run: |
          if ! [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must match vX.Y.Z or vX.Y.Z-suffix; got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set package version from git tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Using tag version: ${TAG_VERSION}"
          python tools/set_library_version.py "${TAG_VERSION}"
          echo "Updated library.json:"
          cat library.json

      - name: Login to PlatformIO
        env:
          PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
        run: |
          if [ -z "${PLATFORMIO_AUTH_TOKEN}" ]; then
            echo "Missing required secret: PLATFORMIO_AUTH_TOKEN" >&2
            exit 1
          fi
          pio account login --token "${PLATFORMIO_AUTH_TOKEN}"
          pio account show

      - name: Dry-run package pack
        run: |
          pio pkg pack --output /tmp/iofusion-release.tar.gz

      - name: Publish package
        run: |
          pio pkg publish --type library --owner "${PLATFORMIO_OWNER}" --no-interactive

      - name: Show published package
        run: |
          pio pkg show --type library "${PLATFORMIO_OWNER}/${PLATFORMIO_PACKAGE}"

      - name: Create or update GitHub Release notes with PlatformIO link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REGISTRY_URL="https://registry.platformio.org/libraries/${PLATFORMIO_OWNER}/${PLATFORMIO_PACKAGE}"
          INSTALL_SNIPPET=$(printf 'lib_deps =\n  %s/%s@^%s' "${PLATFORMIO_OWNER}" "${PLATFORMIO_PACKAGE}" "${VERSION}")

          EXTRA_NOTES=$(cat <<EOF

## PlatformIO
- Registry: ${REGISTRY_URL}
- Version: ${VERSION}

### Install
\`\`\`ini
${INSTALL_SNIPPET}
\`\`\`
EOF
)

          if gh release view "${TAG}" >/dev/null 2>&1; then
            CURRENT_BODY=$(gh release view "${TAG}" --json body --jq '.body // ""')
            if echo "${CURRENT_BODY}" | grep -q "Registry: ${REGISTRY_URL}"; then
              echo "Release notes already contain PlatformIO block."
            else
              gh release edit "${TAG}" --notes "${CURRENT_BODY}${EXTRA_NOTES}"
              echo "Updated existing release notes for ${TAG}."
            fi
          else
            gh release create "${TAG}" --title "${TAG}" --notes "${EXTRA_NOTES#\n}"
            echo "Created release for ${TAG}."
          fi
