name: Release Publish (PlatformIO)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Validate before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run native tests
        run: |
          pio --version
          pio test -e native -v

      - name: Build firmware (uno)
        run: |
          pio run -e uno -v

  publish:
    name: Publish to PlatformIO Registry
    needs: [test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate tag matches library.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          LIB_VERSION=$(python - <<'PY'
import json
with open('library.json') as f:
    print(json.load(f)['version'])
PY
)
          echo "Tag version: ${TAG_VERSION}"
          echo "library.json version: ${LIB_VERSION}"
          if [ "${TAG_VERSION}" != "${LIB_VERSION}" ]; then
            echo "Tag and library.json version mismatch" >&2
            exit 1
          fi

      - name: Login to PlatformIO
        env:
          PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
        run: |
          if [ -z "${PLATFORMIO_AUTH_TOKEN}" ]; then
            echo "Missing required secret: PLATFORMIO_AUTH_TOKEN" >&2
            exit 1
          fi
          pio account login --token "${PLATFORMIO_AUTH_TOKEN}"
          pio account show

      - name: Publish package
        run: |
          yes | pio pkg publish --type library

      - name: Show published package
        run: |
          pio pkg show --type library djwinter29/IOFusion
